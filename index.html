<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }

        .task-card {
            transition: all 0.2s ease;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .dropdown-menu {
            animation: menuPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes menuPop {
            from { opacity: 0; transform: scale(0.9) translateY(-15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen">
    <div class="flex flex-col h-screen">

        <!-- Top Bar -->
        <header class="h-16 bg-white border-b border-zinc-100 px-4 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <button onclick="toggleDropdown()" class="p-3 text-zinc-700 hover:bg-zinc-100 rounded-3xl transition-colors">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-3xl flex items-center justify-center text-white font-bold text-xl">T</div>
                    <span class="font-semibold text-2xl tracking-tight">Taskify</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="text-sm font-medium">FBI</div>
                        <div class="text-xs text-zinc-500">Agent</div>
                    </div>
                    <div class="w-8 h-8 bg-zinc-800 text-white rounded-3xl flex items-center justify-center font-medium text-sm">FBI</div>
                </div>
            </div>
        </header>

        <!-- Pop-up Menu -->
        <div id="dropdownMenu" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center">
            <div onclick="event.stopImmediatePropagation()" class="dropdown-menu bg-white rounded-3xl w-full max-w-xs mx-4 shadow-2xl overflow-hidden">
                <div class="px-5 pt-5 pb-3 border-b border-zinc-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-600 rounded-3xl flex items-center justify-center text-white font-bold text-xl">T</div>
                        <span class="font-semibold text-xl tracking-tight">Taskify</span>
                    </div>
                    <button onclick="toggleDropdown()" class="text-zinc-400 hover:text-zinc-600">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                </div>

                <div class="p-2">
                    <button onclick="showAddModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 px-5 rounded-3xl flex items-center justify-center gap-2 mb-4">
                        <i class="fa-solid fa-plus"></i>
                        New Task
                    </button>

                    <div class="space-y-1 px-1">
                        <div onclick="selectFilter('all')" class="nav-item flex items-center gap-3 px-5 py-3.5 rounded-3xl cursor-pointer hover:bg-zinc-100">
                            <i class="fa-solid fa-inbox w-5"></i>
                            <span class="font-medium">All Tasks</span>
                        </div>
                        <div onclick="selectFilter('active')" class="nav-item flex items-center gap-3 px-5 py-3.5 rounded-3xl cursor-pointer hover:bg-zinc-100">
                            <i class="fa-solid fa-clock w-5"></i>
                            <span class="font-medium">Active</span>
                        </div>
                        <div onclick="selectFilter('completed')" class="nav-item flex items-center gap-3 px-5 py-3.5 rounded-3xl cursor-pointer hover:bg-zinc-100">
                            <i class="fa-solid fa-check-circle w-5"></i>
                            <span class="font-medium">Completed</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-4 overflow-auto">
            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div class="bg-white rounded-3xl p-5 border border-zinc-100">
                        <div class="text-xs text-zinc-500">Total</div>
                        <div id="totalTasks" class="text-3xl font-semibold mt-1"></div>
                    </div>
                    <div class="bg-white rounded-3xl p-5 border border-zinc-100">
                        <div class="text-xs text-zinc-500">Completed</div>
                        <div id="completedTasks" class="text-3xl font-semibold mt-1 text-emerald-600"></div>
                    </div>
                    <div class="bg-white rounded-3xl p-5 border border-zinc-100">
                        <div class="text-xs text-zinc-500">Pending</div>
                        <div id="pendingTasks" class="text-3xl font-semibold mt-1 text-amber-600"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <h1 id="viewTitle" class="text-2xl font-semibold">All Tasks</h1>
                    <select id="priorityFilter" onchange="filterTasks()" class="bg-white border border-zinc-200 rounded-3xl px-5 py-2 text-sm">
                        <option value="">All Priorities</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div id="taskList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="taskModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[110] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-xl">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="modalTitle" class="text-2xl font-semibold">New Task</h2>
                    <button onclick="hideModal()" class="text-zinc-400 hover:text-zinc-600">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                </div>

                <form id="taskForm" onsubmit="saveTask(event)">
                    <input type="hidden" id="editId">
                    <div class="space-y-5">
                        <div>
                            <label class="text-sm font-medium text-zinc-600 block mb-1">Title</label>
                            <input id="taskTitle" type="text" required class="w-full border border-zinc-200 rounded-3xl px-5 py-3.5 focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="text-sm font-medium text-zinc-600 block mb-1">Description</label>
                            <textarea id="taskDesc" rows="3" class="w-full border border-zinc-200 rounded-3xl px-5 py-3.5 focus:outline-none focus:border-blue-500 resize-none"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-sm font-medium text-zinc-600 block mb-1">Due Date</label>
                                <input id="taskDue" type="date" required class="w-full border border-zinc-200 rounded-3xl px-5 py-3.5 focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="text-sm font-medium text-zinc-600 block mb-1">Priority</label>
                                <select id="taskPriority" class="w-full border border-zinc-200 rounded-3xl px-5 py-3.5 focus:outline-none focus:border-blue-500">
                                    <option value="low">Low</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="high">High</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-8">
                        <button type="button" onclick="hideModal()" class="flex-1 py-4 border border-zinc-200 rounded-3xl font-medium hover:bg-zinc-50">Cancel</button>
                        <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-3xl font-medium hover:bg-blue-700">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentFilter = 'all';
        let currentEditId = null;

        const sampleTasks = [
            // Original
            {id: 1001, title: "Finalize Q3 marketing campaign", description: "Prepare slides and assets", due: "2026-06-15", priority: "high", completed: false},
            {id: 1002, title: "Schedule dentist appointment", description: "", due: "2026-06-20", priority: "medium", completed: true},
            {id: 1003, title: "Review new logo concepts", description: "Choose between options", due: "2026-06-12", priority: "low", completed: false},
            
            // New Campus Performance Tasks
            {id: 1004, title: "Rehearse opening scene for campus play", description: "Practice with drama club", due: "2026-06-11", priority: "high", completed: false},
            {id: 1005, title: "Book auditorium for student talent show", description: "Confirm date with admin office", due: "2026-06-13", priority: "high", completed: false},
            {id: 1006, title: "Practice dance routine for cultural fest", description: "Choreography with team", due: "2026-06-14", priority: "medium", completed: false},
            {id: 1007, title: "Prepare music setlist for open mic night", description: "Select 5 songs", due: "2026-06-16", priority: "medium", completed: true},
            {id: 1008, title: "Coordinate with lighting team for performance", description: "Final tech rehearsal", due: "2026-06-17", priority: "high", completed: false},
            {id: 1009, title: "Submit costume requirements for theater show", description: "Send list to wardrobe dept", due: "2026-06-10", priority: "medium", completed: false},
            {id: 1010, title: "Record promo video for campus concert", description: "Edit and upload to socials", due: "2026-06-18", priority: "low", completed: false}
        ];

        function loadTasks() {
            const saved = JSON.parse(localStorage.getItem('tasks')) || [];
            // Merge sample tasks if missing
            sampleTasks.forEach(sample => {
                if (!saved.find(t => t.id === sample.id)) {
                    saved.push(sample);
                }
            });
            tasks = saved;
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function toggleDropdown() {
            document.getElementById('dropdownMenu').classList.toggle('hidden');
        }

        function selectFilter(filter) {
            currentFilter = filter;
            document.getElementById('dropdownMenu').classList.add('hidden');
            renderTasks(getFilteredTasks());
            const titles = { all: 'All Tasks', active: 'Active Tasks', completed: 'Completed Tasks' };
            document.getElementById('viewTitle').textContent = titles[filter] || 'All Tasks';
        }

        function renderTasks(filteredTasks) {
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            if (filteredTasks.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-zinc-400"><i class="fa-solid fa-clipboard-list text-5xl mb-4"></i><p class="text-lg">No tasks found</p></div>`;
                return;
            }

            filteredTasks.forEach(task => {
                const due = new Date(task.due);
                const isOverdue = due < new Date() && !task.completed;

                const html = `
                    <div class="task-card bg-white border border-zinc-200 rounded-3xl p-5 flex items-start gap-4 group">
                        <button onclick="toggleComplete(${task.id}); event.stopImmediatePropagation()" 
                                class="mt-1 w-6 h-6 rounded-2xl border-2 flex items-center justify-center flex-shrink-0
                                ${task.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-zinc-300 hover:border-blue-500'}">
                            ${task.completed ? '✓' : ''}
                        </button>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <h3 onclick="editTask(${task.id})" class="font-medium text-base cursor-pointer pr-4 ${task.completed ? 'line-through text-zinc-400' : 'text-zinc-800'}">
                                    ${task.title}
                                </h3>
                                <span class="text-xs px-4 py-1 rounded-3xl font-medium whitespace-nowrap
                                    ${task.priority === 'high' ? 'bg-red-100 text-red-600' : 
                                      task.priority === 'medium' ? 'bg-amber-100 text-amber-600' : 'bg-blue-100 text-blue-600'}">
                                    ${task.priority}
                                </span>
                            </div>
                            ${task.description ? `<p class="text-zinc-500 text-sm mt-1.5 line-clamp-2">${task.description}</p>` : ''}
                            <div class="flex items-center gap-4 mt-4 text-sm">
                                <div class="flex items-center gap-1.5 text-zinc-500">
                                    <i class="fa-solid fa-calendar-days"></i>
                                    <span class="${isOverdue ? 'text-red-500' : ''}">${due.toLocaleDateString('en-US', {month:'short', day:'numeric'})}</span>
                                </div>
                                <span class="text-xs uppercase tracking-widest ${task.completed ? 'text-emerald-600' : 'text-amber-600'}">
                                    ${task.completed ? '✓ Done' : 'Active'}
                                </span>
                            </div>
                        </div>
                        <button onclick="deleteTask(${task.id}); event.stopImmediatePropagation()" class="opacity-0 group-hover:opacity-100 text-zinc-400 hover:text-red-500 p-2">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                container.innerHTML += html;
            });

            updateStats();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = total - completed;
        }

        // Rest of the functions (saveTask, toggleComplete, etc.) remain the same
        function saveTask(e) {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const due = document.getElementById('taskDue').value;
            const priority = document.getElementById('taskPriority').value;

            if (!title || !due) return;

            if (currentEditId) {
                const task = tasks.find(t => t.id === currentEditId);
                if (task) {
                    task.title = title;
                    task.description = desc;
                    task.due = due;
                    task.priority = priority;
                }
            } else {
                tasks.push({ id: Date.now(), title, description: desc, due, priority, completed: false });
            }

            localStorage.setItem('tasks', JSON.stringify(tasks));
            hideModal();
            renderTasks(getFilteredTasks());
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) task.completed = !task.completed;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks(getFilteredTasks());
        }

        function deleteTask(id) {
            if (confirm("Delete this task?")) {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks(getFilteredTasks());
            }
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDesc').value = task.description || '';
            document.getElementById('taskDue').value = task.due;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskModal').classList.add('flex');
        }

        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'New Task';
            document.getElementById('taskForm').reset();
            document.getElementById('taskDue').valueAsDate = new Date();
            document.getElementById('dropdownMenu').classList.add('hidden');
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskModal').classList.add('flex');
        }

        function hideModal() {
            const modal = document.getElementById('taskModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function getFilteredTasks() {
            let filtered = tasks.filter(task => {
                if (currentFilter === 'active') return !task.completed;
                if (currentFilter === 'completed') return task.completed;
                return true;
            });

            const priority = document.getElementById('priorityFilter').value;
            if (priority) filtered = filtered.filter(t => t.priority === priority);

            return filtered.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                return new Date(a.due) - new Date(b.due);
            });
        }

        function filterTasks() {
            renderTasks(getFilteredTasks());
        }

        function initializeApp() {
            loadTasks();
            renderTasks(getFilteredTasks());
        }

        window.onload = initializeApp;

        document.getElementById('dropdownMenu').addEventListener('click', function(e) {
            if (e.target.id === 'dropdownMenu') this.classList.add('hidden');
        });
    </script>
</body>
</html>
